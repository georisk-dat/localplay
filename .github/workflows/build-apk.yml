name: Compilar APK LocalPlay

# Se ejecuta automáticamente cada vez que subes archivos a GitHub
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite ejecutarlo manualmente desde la web

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest        # máquina Linux de GitHub (gratis)

    steps:

      # 1. Descarga el código del repositorio
      - name: Descargar código
        uses: actions/checkout@v4

      # 2. Instala Java 17 (requerido por Android)
      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Instala el Android SDK completo
      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      # 4. Acepta las licencias del SDK automáticamente
      - name: Aceptar licencias Android
        run: yes | sdkmanager --licenses || true

      # 5. Instala Gradle directo desde el servidor oficial (más confiable)
      - name: Instalar Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      # 6. ¡Compila la APK!
      - name: Compilar APK debug
        run: gradle assembleDebug

      # 7. Guarda la APK como archivo descargable
      - name: Subir APK para descarga
        uses: actions/upload-artifact@v4
        with:
          name: LocalPlay-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30     # disponible 30 días para descargar
